{% extends "dashboard.html" %}

{% block title %}心情报表 - 学生心情晴雨表{% endblock %}

{% block content %}
<section class="page-heading">
  <p class="eyebrow">心情报表</p>
  <h1>记录今天的心情</h1>
</section>

<form class="mood-form" method="post" action="{{ url_for('mood_report') }}">
  <fieldset class="mood-picker">
    <legend>选择一个最接近的心情</legend>
    <div class="mood-options">
      {% for mood in moods %}
        <label class="mood-option">
          <input type="radio" name="mood_emoji" value="{{ mood.emoji }}" required>
          <span class="mood-emoji">{{ mood.emoji }}</span>
          <span class="mood-label">{{ mood.label }}</span>
        </label>
      {% endfor %}
    </div>
  </fieldset>

  <div class="question-list">
    <label class="reason-field question-field">
      <span>1. 今天做了什么，什么影响了你的心情？</span>
      <textarea name="day_event" rows="2" required></textarea>
    </label>

    <label class="reason-field question-field">
      <span>2. 今天身体感觉怎么样？</span>
      <textarea name="body_feeling" rows="2" required></textarea>
    </label>

    <label class="reason-field question-field">
      <span>3. 还有什么想说的？</span>
      <textarea name="extra_thoughts" rows="2"></textarea>
    </label>
  </div>

  <button class="primary-button compact" type="submit">提交心情</button>
</form>
{% endblock %}
